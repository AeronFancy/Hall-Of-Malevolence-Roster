<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hall of Malevolence — Roster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root[data-theme="dark"] {
      --bg:        #0d0d0d;
      --bg2:       #111111;
      --bg3:       #0f0f0f;
      --bg4:       #141414;
      --border:    #1e1e1e;
      --border2:   #2a2a2a;
      --text:      #d0d0d0;
      --text2:     #888;
      --text3:     #444;
      --text4:     #2e2e2e;
      --input-bg:  #141414;
    }
    :root[data-theme="light"] {
      --bg:        #f5f5f5;
      --bg2:       #ffffff;
      --bg3:       #efefef;
      --bg4:       #e8e8e8;
      --border:    #ddd;
      --border2:   #ccc;
      --text:      #1a1a1a;
      --text2:     #555;
      --text3:     #888;
      --text4:     #aaa;
      --input-bg:  #fff;
    }

    body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }

    /* HERO */
    .hero {
      text-align: center;
      padding: 2.5rem 1rem 2rem;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg2);
      position: relative;
    }
    .hero-tag { font-size: 11px; letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase; margin-bottom: 0.5rem; }
    .hero h1 { font-size: 30px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
    .hero h1 span { color: var(--text2); }
    .hero-sub { margin-top: 0.4rem; font-size: 12px; color: var(--text4); }

    /* DISCORD + THEME btns */
    .hero-actions {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .discord-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      border: 0.5px solid #5865f255;
      background: #5865f215;
      color: #7289da;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .discord-btn:hover { background: #5865f230; border-color: #5865f2aa; }
    .discord-btn svg { width: 14px; height: 14px; fill: #7289da; }

    .theme-toggle {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 0.5px solid var(--border2);
      background: var(--bg3);
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      font-size: 15px;
    }
    .theme-toggle:hover { background: var(--bg4); border-color: var(--text3); }

    /* STATS */
    .stats { display: flex; justify-content: center; gap: 2.5rem; padding: 1.25rem 1rem; border-bottom: 0.5px solid var(--border); background: var(--bg3); }
    .stat { text-align: center; }
    .stat-num { font-size: 22px; font-weight: 500; color: var(--text); }
    .stat-icon { font-size: 16px; margin-bottom: 2px; }
    .stat-label { font-size: 10px; color: var(--text3); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.1em; }

    /* FILTERS */
    .filters { display: flex; gap: 8px; padding: 1rem 1.5rem; flex-wrap: wrap; border-bottom: 0.5px solid var(--border); background: var(--bg); align-items: center; }
    .filter-btn {
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 20px;
      border: 0.5px solid var(--border2);
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .filter-btn:hover { border-color: var(--text2); color: var(--text); background: var(--bg4); }
    .filter-btn.active { border-color: #555; color: #eee; background: #1f1f1f; }
    [data-theme="light"] .filter-btn.active { border-color: #999; color: #111; background: #e0e0e0; }
    .filter-icon { font-size: 13px; }

    /* SEARCH */
    .search-wrap { padding: 0.75rem 1.5rem; border-bottom: 0.5px solid var(--border); background: var(--bg); }
    .search-input {
      width: 100%; max-width: 320px;
      background: var(--input-bg);
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--text2); }

    /* ROSTER */
    .roster { padding: 0.5rem 1rem 3rem; }
    .header-row {
      display: grid;
      grid-template-columns: 36px 1fr 165px 105px 130px 120px;
      gap: 12px; padding: 6px 14px; margin-bottom: 4px;
    }
    .header-row span { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text4); }

    .member-row {
      display: grid;
      grid-template-columns: 36px 1fr 165px 105px 130px 120px;
      align-items: center;
      gap: 12px; padding: 9px 14px;
      border-radius: 8px;
      border: 0.5px solid transparent;
      margin-bottom: 2px;
      transition: background 0.1s, border-color 0.1s;
    }
    .member-row:hover { background: var(--bg4); border-color: var(--border); }

    .member-index { font-size: 12px; color: var(--text4); text-align: right; }
    .member-name-wrap { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .member-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* NEW badge */
    .new-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 20px;
      background: #1a1400;
      color: #f0c040;
      border: 0.5px solid #f0c04055;
      letter-spacing: 0.05em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    [data-theme="light"] .new-badge { background: #fff8e0; border-color: #d4a017; }

    .rank-badge {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
      display: inline-block;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 163px;
    }
    .role-pill { font-size: 11px; color: var(--text3); }
    .cell-muted { font-size: 12px; color: var(--text4); }
    .no-results { text-align: center; padding: 3rem; color: var(--text4); font-size: 13px; }

    /* RANK COLORS */
    .r-hall-lord   { color: #ff3333; border: 0.5px solid #ff333344; background: #180000; }
    .r-hall-lady   { color: #ffa6fb; border: 0.5px solid #ffa6fb44; background: #180018; }
    .r-exalted     { color: #58d9fc; border: 0.5px solid #58d9fc44; background: #001c22; }
    .r-eminent     { color: #1abc9b; border: 0.5px solid #1abc9b44; background: #001a12; }
    .r-revered     { color: #ff8652; border: 0.5px solid #ff865244; background: #1a0e00; }
    .r-exultant    { color: #a07aff; border: 0.5px solid #5900ff44; background: #0e0022; }
    .r-emeritus    { color: #cc55cc; border: 0.5px solid #540c5a66; background: #140014; }
    .r-menace      { color: #71ff9e; border: 0.5px solid #71ff9e44; background: #001a0a; }
    .r-sentinel    { color: #8b7f75; border: 0.5px solid #8b7f7544; background: #111110; }
    .r-dignitary   { color: #5588ff; border: 0.5px solid #1e5cda44; background: #000a1c; }
    .r-vexillarius { color: #d85352; border: 0.5px solid #d8535244; background: #1a0808; }
    .r-esquier     { color: #ffff00; border: 0.5px solid #ffff0044; background: #1a1a00; }
    .r-legion      { color: #ae83ff; border: 0.5px solid #ae83ff44; background: #0e0022; }
    .r-venator     { color: #ff84a1; border: 0.5px solid #ff84a144; background: #1a0012; }
    .r-hnic        { color: #5588bb; border: 0.5px solid #00244d66; background: #00244d22; }
    .r-darh        { color: #555;    border: 0.5px solid #2a2a2a;   background: #080808; }
    .r-associate   { color: #4aaa1a; border: 0.5px solid #1d660744; background: #0a1400; }
    .r-na          { color: #444;    border: 0.5px solid #222;      background: #111; }

    /* Light theme rank badge overrides — keep colors, lighten backgrounds */
    [data-theme="light"] .r-hall-lord   { background: #fff0f0; }
    [data-theme="light"] .r-hall-lady   { background: #fff0ff; }
    [data-theme="light"] .r-exalted     { background: #e8f9ff; }
    [data-theme="light"] .r-eminent     { background: #e8fff9; }
    [data-theme="light"] .r-revered     { background: #fff3ee; }
    [data-theme="light"] .r-exultant    { background: #f3eeff; }
    [data-theme="light"] .r-emeritus    { background: #faeefa; }
    [data-theme="light"] .r-menace      { background: #eeffee; }
    [data-theme="light"] .r-sentinel    { background: #f5f3f2; }
    [data-theme="light"] .r-dignitary   { background: #eef3ff; }
    [data-theme="light"] .r-vexillarius { background: #fff0f0; }
    [data-theme="light"] .r-esquier     { background: #fffff0; }
    [data-theme="light"] .r-legion      { background: #f5f0ff; }
    [data-theme="light"] .r-venator     { background: #fff0f5; }
    [data-theme="light"] .r-hnic        { background: #eef4ff; }
    [data-theme="light"] .r-darh        { color: #888; background: #f5f5f5; }
    [data-theme="light"] .r-associate   { background: #f0fff0; }
    [data-theme="light"] .r-na          { color: #999; background: #f5f5f5; }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">SA:MP Group Roster</div>
  <h1>Hall <span>of</span> Malevolence</h1>
  <div class="hero-sub">Last updated: <span id="last-updated">—</span></div>
  <div class="hero-actions">
    <a class="discord-btn" href="https://discord.gg/CkJekTHbPp" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
      Join Discord
    </a>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme">🌙</button>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-icon">👑</div>
    <div class="stat-num" id="total-count">—</div>
    <div class="stat-label">Total</div>
  </div>
  <div class="stat">
    <div class="stat-icon">⚔️</div>
    <div class="stat-num" id="leader-count">—</div>
    <div class="stat-label">Leaders</div>
  </div>
  <div class="stat">
    <div class="stat-icon">🛡️</div>
    <div class="stat-num" id="cl-count">—</div>
    <div class="stat-label">Co-Leaders</div>
  </div>
  <div class="stat">
    <div class="stat-icon">👤</div>
    <div class="stat-num" id="member-count">—</div>
    <div class="stat-label">Members</div>
  </div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)"><span class="filter-icon">🔍</span> All</button>
  <button class="filter-btn" onclick="setFilter('Leader', this)"><span class="filter-icon">👑</span> Leaders</button>
  <button class="filter-btn" onclick="setFilter('Co-Leader', this)"><span class="filter-icon">🛡️</span> Co-Leaders</button>
  <button class="filter-btn" onclick="setFilter('Member', this)"><span class="filter-icon">👤</span> Members</button>
</div>

<div class="search-wrap">
  <input class="search-input" type="text" placeholder="Search by name..." oninput="onSearch(this.value)" />
</div>

<div class="roster">
  <div class="header-row">
    <span>#</span>
    <span>Name</span>
    <span>Rank</span>
    <span>Role</span>
    <span>Invited by</span>
    <span>Joined</span>
  </div>
  <div id="roster-list"></div>
</div>

<script>
const RANK_ORDER = [
  'Hall Lord','Hall Lady','Exalted','Eminent','Revered','Exultant',
  'Emeritus',
  'Menace','Sentinel','Dignitary','Vexillarius',
  'Esquier','Legion','Venator','Dead And Rotting In Hell','H.N.I.C','Associate'
];

const RANK_CSS = {
  'Hall Lord':               'r-hall-lord',
  'Hall Lady':               'r-hall-lady',
  'Exalted':                 'r-exalted',
  'Eminent':                 'r-eminent',
  'Revered':                 'r-revered',
  'Exultant':                'r-exultant',
  'Emeritus':                'r-emeritus',
  'Menace':                  'r-menace',
  'Sentinel':                'r-sentinel',
  'Dignitary':               'r-dignitary',
  'Vexillarius':             'r-vexillarius',
  'Esquier':                 'r-esquier',
  'Legion':                  'r-legion',
  'Venator':                 'r-venator',
  'Dead And Rotting In Hell':'r-darh',
  'H.N.I.C':                'r-hnic',
  'Associate':               'r-associate'
};

const NEW_BADGE_DAYS = 2;

let allMembers = [];
let currentFilter = 'all';
let currentSearch = '';

function isNew(joinedStr) {
  if (!joinedStr) return false;
  const joined = new Date(joinedStr);
  const diff   = (Date.now() - joined.getTime()) / (1000 * 60 * 60 * 24);
  return diff <= NEW_BADGE_DAYS;
}

function formatDate(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function formatLastUpdated(dateStr) {
  if (!dateStr) return '—';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

async function loadRoster() {
  try {
    const res  = await fetch('data/roster.json?t=' + Date.now());
    const data = await res.json();

    allMembers = data.members.sort((a, b) => {
      const ai = RANK_ORDER.indexOf(a.rank);
      const bi = RANK_ORDER.indexOf(b.rank);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });

    document.getElementById('last-updated').textContent = formatLastUpdated(data.lastUpdated);
    updateStats();
    render();
  } catch (e) {
    document.getElementById('roster-list').innerHTML =
      '<div class="no-results">Failed to load roster data.</div>';
  }
}

function updateStats() {
  const leaders = allMembers.filter(m => m.role === 'Leader').length;
  const cls     = allMembers.filter(m => m.role === 'Co-Leader').length;
  const mems    = allMembers.filter(m => m.role === 'Member' || m.role === 'N/A').length;
  document.getElementById('total-count').textContent  = allMembers.length;
  document.getElementById('leader-count').textContent = leaders;
  document.getElementById('cl-count').textContent     = cls;
  document.getElementById('member-count').textContent = mems;
}

function render() {
  const list = document.getElementById('roster-list');
  list.innerHTML = '';

  let filtered = allMembers;
  if (currentFilter !== 'all') {
    filtered = filtered.filter(m =>
      currentFilter === 'Member'
        ? (m.role === 'Member' || m.role === 'N/A')
        : m.role === currentFilter
    );
  }
  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(m => m.name.toLowerCase().includes(q));
  }

  if (!filtered.length) {
    list.innerHTML = '<div class="no-results">No members found.</div>';
    return;
  }

  filtered.forEach((m, i) => {
    const div  = document.createElement('div');
    div.className = 'member-row';
    const css  = RANK_CSS[m.rank] || 'r-na';
    const role = m.role === 'N/A' ? '—' : m.role;
    const newBadge = isNew(m.joined) ? '<span class="new-badge">NEW</span>' : '';

    div.innerHTML = `
      <span class="member-index">${i + 1}</span>
      <span class="member-name-wrap">
        <span class="member-name">${escHtml(m.name)}</span>
        ${newBadge}
      </span>
      <span class="rank-badge ${css}">${escHtml(m.rank)}</span>
      <span class="role-pill">${role}</span>
      <span class="cell-muted">${m.invitedBy ? escHtml(m.invitedBy) : '—'}</span>
      <span class="cell-muted">${formatDate(m.joined)}</span>
    `;
    list.appendChild(div);
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function onSearch(val) {
  currentSearch = val.trim();
  render();
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Theme toggle
const html        = document.documentElement;
const themeBtn    = document.getElementById('theme-toggle');
const savedTheme  = localStorage.getItem('hom-theme') || 'dark';
html.setAttribute('data-theme', savedTheme);
themeBtn.textContent = savedTheme === 'dark' ? '🌙' : '☀️';

themeBtn.addEventListener('click', () => {
  const current = html.getAttribute('data-theme');
  const next    = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  themeBtn.textContent = next === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('hom-theme', next);
});

loadRoster();
</script>
</body>
</html>
